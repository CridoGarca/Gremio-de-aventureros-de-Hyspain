<div class="min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-md p-8 panel-cristal rounded-xl text-center">
    <div class="flex justify-center mb-4">
      <img src="https://cdn-icons-png.flaticon.com/512/10512/10512613.png" alt="Emblema"
        class="w-24 h-24 drop-shadow-[0_0_15px_rgba(212,175,55,0.8)] filter invert-[.8] sepia-[1] saturate-[5] hue-rotate-[3deg]">
    </div>
    <h1 class="text-4xl text-yellow-500 mb-2 fuente-gremio font-black tracking-wider drop-shadow-lg">El Gremio</h1>
    <p class="text-sm text-gray-400 mb-8 italic">"Forjando leyendas en las tierras de Orbis"</p>

    <div class="relative mb-4 borde-resplandor rounded">
      <i class="fa-solid fa-user absolute left-4 top-4 text-yellow-600"></i>
      <input [(ngModel)]="nombre" type="text" placeholder="Nombre de Aventurero"
        class="w-full p-3 pl-10 bg-black/50 border border-transparent rounded text-white focus:outline-none">
    </div>

    <div class="relative mb-8 borde-resplandor rounded">
      <i class="fa-solid fa-key absolute left-4 top-4 text-yellow-600"></i>
      <input [(ngModel)]="password" type="password" placeholder="Contraseña"
        (keyup.enter)="adentrarse()"
        class="w-full p-3 pl-10 bg-black/50 border border-transparent rounded text-white focus:outline-none">
    </div>

    <div class="flex flex-col gap-3">
      <button (click)="adentrarse()" [disabled]="cargando()"
        class="w-full p-3 btn-medieval rounded fuente-gremio font-bold text-lg disabled:opacity-50">
        <i class="fa-solid fa-door-open mr-2"></i>
        {{ cargando() ? 'Entrando...' : 'Adentrarse' }}
      </button>
      <button (click)="firmarContrato()" [disabled]="cargando()"
        class="w-full p-3 bg-neutral-800/80 border border-gray-600 text-gray-300 rounded hover:bg-neutral-700 transition disabled:opacity-50">
        <i class="fa-solid fa-feather-pointed mr-2"></i> Firmar Contrato
      </button>
    </div>

    @if (error()) {
      <p class="text-red-400 mt-4 text-sm bg-red-900/30 p-2 rounded border border-red-800/50">
        <i class="fa-solid fa-circle-exclamation mr-2"></i>{{ error() }}
      </p>
    }
  </div>
</div>
